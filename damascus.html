<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИРИЯ</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            /* Фон с картой мира */
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 50px; 
            font-size: 14px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        .header a { color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 4px; }

        .country-title {
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .city-card {
            width: 100%;
            max-width: 350px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }

        .city-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #1a1a1a;
            border-radius: 15px;
            margin-bottom: 20px;
            background-size: cover;
            background-position: center;
            border: 1px solid #333;
        }

        .city-name {
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .back-link {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #ffffff;
            opacity: 0.8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>

    <div class="country-title">СИРИЯ</div>

    <!-- Карточка с Алеппо, которая ведет на страницу с разделами -->
    <a href="aleppo_details.html" class="city-card">
        <div class="city-image" style="background-image: url('images/cities/se.webp');"></div>
        <div class="city-name">АЛЕППО</div>
    </a>

    <a href="friends.html" class="back-link">← НАЗАД К СТРАНАМ</a>

</body>
</html>
