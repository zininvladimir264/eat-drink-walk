<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>АЛЕППО - Разделы</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .section { margin-bottom: 40px; }
        .section-title { font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        /* Контейнер для трех карточек */
        .cards-grid { display: flex; gap: 15px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 200px; background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; }
        .card-img { width: 100%; height: 120px; background: #333; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>АЛЕППО</h1>

    <!-- Шаблон раздела -->
    <div class="section">
        <div class="section-title">Еда</div>
        <div class="cards-grid">
            <div class="card"><div class="card-img"></div>Название 1</div>
            <div class="card"><div class="card-img"></div>Название 2</div>
            <div class="card"><div class="card-img"></div>Название 3</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Крепкое</div>
        <div class="cards-grid">
            <div class="card"><div class="card-img"></div>Название 1</div>
            <div class="card"><div class="card-img"></div>Название 2</div>
            <div class="card"><div class="card-img"></div>Название 3</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Пиво</div>
        <div class="cards-grid">
            <div class="card"><div class="card-img"></div>Название 1</div>
            <div class="card"><div class="card-img"></div>Название 2</div>
            <div class="card"><div class="card-img"></div>Название 3</div>
        </div>
    </div>

    <!-- Аналогично для остальных разделов: Напитки, Места -->
</body>
</html>
