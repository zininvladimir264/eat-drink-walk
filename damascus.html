<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АЛЕППО - Ем ПЬЮ ХОЖУ</title>
    
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            touch-action: pan-y;
        }

        .country-header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .country-header h2 {
            margin: 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #666;
            font-weight: 600;
        }

        .city-header {
            text-align: center;
            padding: 20px 20px;
        }

        .city-header h1 {
            margin: 0;
            font-size: 45px;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 800;
        }

        .category-nav {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            z-index: 100;
            border-bottom: 1px solid #222;
            backdrop-filter: blur(10px);
            overflow-x: auto;
            white-space: nowrap;
        }

        .category-nav button {
            background: none;
            border: none;
            color: #666;
            font-size: 24px; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            padding: 10px 0;
            transition: 0.3s;
        }

        .category-nav button.active {
            color: #fff;
            border-bottom: 3px solid #fff;
        }

        .grid-container {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid-container.active {
            display: grid;
        }

        .item-card {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .item-card:hover { transform: scale(1.02); }

        .item-image {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #222;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .item-info h3 { margin: 0 0 5px 0; text-transform: uppercase; }
        .item-info p { margin: 0; color: #888; font-size: 14px; }

        .back-btn {
            display: block;
            text-align: center;
            margin: 50px auto;
            color: #666;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="country-header">
        <h2>СИРИЯ</h2>
    </div>

    <div class="city-header">
        <h1>ДАМАСК</h1>
    </div>

    <nav class="category-nav">
        <button class="tab-btn active" data-target="food">ЕДА</button>
        <button class="tab-btn" data-target="strong">КРЕПКОЕ</button>
        <button class="tab-btn" data-target="beer">ПИВО</button>
        <button class="tab-btn" data-target="places">МЕСТА</button>
    </nav>

    <div id="food" class="grid-container active">
        <div class="item-card" onclick="window.location.href='gallery.html'">
            <div class="item-image"></div>
            <h3>хумус</h3>
            <p>закуска</p>
        </div>
    </div>

    <div id="strong" class="grid-container">
        <div class="item-card" onclick="window.location.href='gallery.html'">
            <div class="item-image"></div>
            <h3>арак</h3>
            <p>крепкое</p>
        </div>
    </div>

    <div id="beer" class="grid-container">
        <div class="item-card" onclick="window.location.href='gallery.html'">
            <div class="item-image"></div>
            <h3>аль-шарк</h3>
            <p>пиво</p>
        </div>
    </div>

    <div id="places" class="grid-container">
        <div class="item-card" onclick="window.location.href='gallery.html'">
            <div class="item-image"></div>
            <h3>старый город</h3>
            <p>место</p>
        </div>
    </div>

    <a href="countries.html" class="back-btn">← НАЗАД К СТРАНАМ</a>

    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.grid-container').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            });
        });
    </script>
</body>
</html>
