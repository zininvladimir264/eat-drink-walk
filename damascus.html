<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СИРИЯ - АЛЕППО</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
        }

        .top-nav {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            padding: 20px;
            background: #000;
            border-bottom: 1px solid #333;
        }

        .top-nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
        }

        .content-area {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 32px;
            margin: 20px 0;
            text-transform: uppercase;
        }

        .photo-card {
            max-width: 400px;
            margin: 0 auto;
            background: #111;
            padding: 10px;
            border-radius: 12px;
        }

        .photo-box {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 14px;
        }

        .card-title {
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .card-subtitle {
            font-size: 18px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#">ГЛАВНАЯ</a>
        <a href="#">СТРАНЫ</a>
    </nav>

    <div class="content-area">
        <h1>СИРИЯ</h1>
        
        <div class="photo-card">
            <div class="photo-box">
                [Фотография СИРИЯ]
            </div>
            <div class="card-title">СИРИЯ</div>
            <div class="card-subtitle">АЛЕППО</div>
        </div>
    </div>

</body>
</html>
