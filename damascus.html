<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДАМАСК</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
        .header a { color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 4px; }
        
        .city-title { font-size: 32px; letter-spacing: 6px; text-transform: uppercase; font-weight: 800; margin-bottom: 40px; }
        
        /* Меню из пяти разделов */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }
        .menu-item {
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            transition: background 0.3s;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.2); }
        
        .back-link { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; color: #ffffff; opacity: 0.8; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>
    
    <div class="city-title">ДАМАСК</div>
    
    <div class="menu-grid">
        <a href="history.html" class="menu-item">ИСТОРИЯ</a>
        <a href="sights.html" class="menu-item">ДОСТОПРИМЕЧАТЕЛЬНОСТИ</a>
        <a href="culture.html" class="menu-item">КУЛЬТУРА</a>
        <a href="cuisine.html" class="menu-item">КУХНЯ</a>
        <a href="map.html" class="menu-item">КАРТА</a>
    </div>
    
    <a href="syria.html" class="back-link">← НАЗАД К СИРИИ</a>
</body>
</html>
