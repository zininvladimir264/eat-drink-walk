<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИРИЯ</title>
    <style>
        body { 
            margin: 0; padding: 40px 20px; min-height: 100vh;
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .country-title { font-size: 32px; letter-spacing: 6px; text-transform: uppercase; font-weight: 800; margin-bottom: 50px; }
        
        /* Это та самая картинка-кнопка */
        .city-link { text-decoration: none; color: #fff; width: 100%; max-width: 350px; }
        .city-image { 
            width: 100%; aspect-ratio: 1 / 1; background: #222; border-radius: 15px; 
            margin-bottom: 20px; background-size: cover; background-position: center; 
            border: 1px solid #444; transition: 0.3s;
        }
        .city-image:hover { border-color: #fff; }
        .city-name { font-size: 24px; letter-spacing: 4px; text-transform: uppercase; font-weight: 700; }
    </style>
</head>
<body>

    <div class="country-title">СИРИЯ</div>

    <a href="damask.html" class="city-link">
        <div class="city-image" style="background-image: url('images/damascus_preview.webp');"></div>
        <div class="city-name">ДАМАСК</div>
    </a>

</body>
</html>
