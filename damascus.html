<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИРИЯ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            /* Фон карты мира как на вашем скриншоте */
            background-image: url('images/world_map_bg.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            width: 100%;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 20px 0;
            font-weight: 800;
        }

        .photo-card {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            margin: 10px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .city-name {
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            margin: 15px 0;
        }

        .back-link {
            color: #aaa;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="countries.html">СТРАНЫ</a>
    </nav>

    <h1>СИРИЯ</h1>

    <div class="photo-card">
        <!-- Путь к фото как вы просили: images/cities/syria.jpg -->
        <img src="images/cities/syria.webp" alt="Сирия" onerror="this.src='placeholder.jpg'">
    </div>

    <div class="city-name">АЛЕППО</div>

    <a href="countries.html" class="back-link">← НАЗАД К СТРАНАМ</a>

</body>
</html>
