<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДАМАСК</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
        }
        .city-card { 
            max-width: 400px; 
            margin: 0 auto; 
            background: rgba(22, 22, 37, 0.8); 
            padding: 20px; 
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        img { width: 100%; border-radius: 10px; }
        h1 { margin-top: 20px; letter-spacing: 3px; text-transform: uppercase; }
        a { color: #ffffff; text-decoration: none; display: block; margin-top: 20px; border-bottom: 1px solid #fff; display: inline-block;}
    </style>
</head>
<body>
    <div class="city-card">
        <img src="images/damascus.jpg" alt="Дамаск">
        <h1>ДАМАСК</h1>
    </div>
    <a href="friends.html">НАЗАД К СТРАНАМ</a>
