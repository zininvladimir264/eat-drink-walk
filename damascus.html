<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИРИЯ</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .country-title {
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 40px;
        }

        .city-card {
            width: 100%;
            max-width: 350px;
        }

        .city-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #1a1a1a;
            border-radius: 15px;
            margin-bottom: 20px;
            background-size: cover;
            background-position: center;
            border: 1px solid #333;
        }

        .city-name {
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .back-link {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #ffffff;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="country-title">СИРИЯ</div>

    <div class="city-card">
        <div class="city-image" style="background-image: url('images/damascus.jpg');"></div>
        <div class="city-name">ДАМАСК</div>
    </div>

    <a href="friends.html" class="back-link">← НАЗАД К СТРАНАМ</a>

</body>
</html>
