<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЕМ ПЬЮ ХОЖУ</title>
    <style>
        body { margin: 0; background-color: #0f0f0f; color: #fff; font-family: sans-serif; }
        
        /* Начальный экран (Сеул/Алеппо) */
        #city-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .city-name { font-size: 2rem; margin-top: 20px; font-weight: bold; }
        .city-photo { width: 300px; height: 300px; border-radius: 20px; cursor: pointer; object-fit: cover; transition: 0.3s; }
        .city-photo:hover { opacity: 0.9; }
        .back-link { margin-top: 20px; color: #666; cursor: pointer; }

        /* Меню (изначально скрыто) */
        #menu-container { display: none; }
        .header-nav { display: flex; justify-content: center; gap: 30px; padding: 30px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #333; }
        .main-title { text-align: center; font-size: 3rem; margin: 40px 0; }
        .section { display: none; padding: 0 20px; max-width: 1000px; margin: auto; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .section.active { display: grid; }
        .card-img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; background: #222; }
        .card-title { font-size: 1.5rem; margin-top: 10px; font-weight: bold; }
        .card-desc { color: #888; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

<!-- Экран выбора города -->
<div id="city-screen">
    <img src="2b858dca-fd46-49f6-87f8-b740e84b9e39" alt="Алеппо" class="city-photo" onclick="openMenu()">
    <div class="city-name">АЛЕППО</div>
    <div class="back-link">← НАЗАД К СТРАНАМ</div>
</div>

<!-- Контейнер меню -->
<div id="menu-container">
    <nav class="header-nav">
        <span style="border-bottom: 2px solid white;">ЕДА</span>
        <span>КРЕПКОЕ</span>
        <span>ПИВО</span>
        <span>НАПИТКИ</span>
        <span>МЕСТА</span>
    </nav>
    <h1 class="main-title">АЛЕППО</h1>

    <div id="food" class="section active">
        <div><img class="card-img" src="images/food/muhammara.webp"><div class="card-title">МУХАММАРА</div><div class="card-desc">ОСТРАЯ ЗАКУСКА.</div></div>
        <div><img class="card-img" src="images/food/kibbeh.webp"><div class="card-title">КИББЕХ</div><div class="card-desc">МЯСНОЕ БЛЮДО.</div></div>
        <div><img class="card-img" src="images/food/fattoush.webp"><div class="card-title">ФАТТУШ</div><div class="card-desc">СВЕЖИЙ САЛАТ.</div></div>
    </div>
</div>

<script>
    function openMenu() {
        document.getElementById('city-screen').style.display = 'none';
        document.getElementById('menu-container').style.display = 'block';
    }
</script>
</body>
</html>
