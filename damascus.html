<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АЛЕППО - Ем ПЬЮ ХОЖУ</title>
    
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; }

        .category-nav {
            position: sticky; top: 0; background: #000; padding: 8px 0;
            display: flex; justify-content: center; gap: 8px; z-index: 100;
        }

        .category-nav button {
            background: none; border: none; color: #666; font-size: 11px;
            text-transform: uppercase; cursor: pointer; padding: 2px 5px;
        }

        .category-nav button.active { color: #fff; border-bottom: 1px solid #fff; }

        .grid-container {
            display: none; grid-template-columns: repeat(3, 1fr);
            gap: 4px; padding: 4px; max-width: 600px; margin: 0 auto;
        }

        .grid-container.active { display: grid; }

        .item-card { background: #111; padding: 3px; border-radius: 4px; }

        .item-image {
            width: 100%; aspect-ratio: 1 / 1; background-color: #222;
            border-radius: 2px; margin-bottom: 2px;
        }

        .item-info { text-align: center; }

        .item-info h3 {
            margin: 0; font-size: 9px; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .item-info p {
            margin: 0; font-size: 7px; text-transform: uppercase; color: #555;
        }
    </style>
</head>
<body>

    <nav class="category-nav">
        <button class="tab-btn active" data-target="food">ЕДА</button>
        <button class="tab-btn" data-target="strong">КРЕПКОЕ</button>
        <button class="tab-btn" data-target="beer">ПИВО</button>
        <button class="tab-btn" data-target="drinks">НАПИТКИ</button>
        <button class="tab-btn" data-target="places">МЕСТА</button>
    </nav>

    <div id="food" class="grid-container active">
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>киббе</h3><p>мясное</p></div></div>
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>махши</h3><p>овощи</p></div></div>
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>мухаммара</h3><p>паста</p></div></div>
    </div>

    <div id="strong" class="grid-container">
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>арак</h3><p>анисовая</p></div></div>
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>шами</h3><p>бренди</p></div></div>
    </div>

    <div id="beer" class="grid-container">
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>al shark</h3><p>лагер</p></div></div>
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>barada</h3><p>лагер</p></div></div>
    </div>

    <div id="drinks" class="grid-container">
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>джеллаб</h3><p>патока</p></div></div>
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>айран</h3><p>йогурт</p></div></div>
    </div>

    <div id="places" class="grid-container">
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>цитадель</h3><p>крепость</p></div></div>
        <div class="item-card"><div class="item-image"></div><div class="item-info"><h3>аль-медина</h3><p>рынок</p></div></div>
    </div>

    <script>
        const tabBtns = document.querySelectorAll('.tab-btn');
        const containers = document.querySelectorAll('.grid-container');

        tabBtns.forEach(btn => btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            containers.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.getAttribute('data-target')).classList.add('active');
        }));
    </script>
</body>
</html>
