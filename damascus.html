<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АЛЕППО - Ем ПЬЮ ХОЖУ</title>
    
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        .country-header { text-align: center; padding: 40px 20px 10px; }
        .country-header h2 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 4px; color: #666; font-weight: 600; }
        .city-header { text-align: center; padding: 20px 20px; }
        .city-header h1 { margin: 0; font-size: 45px; text-transform: uppercase; letter-spacing: 6px; font-weight: 800; }

        .category-nav {
            position: sticky; top: 0; background: rgba(0, 0, 0, 0.95); padding: 25px 0;
            display: flex; justify-content: center; gap: 20px; z-index: 100;
            border-bottom: 1px solid #222; backdrop-filter: blur(10px);
        }

        .category-nav button {
            background: none; border: none; color: #666; font-size: 16px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: 0.3s;
        }

        .category-nav button.active { color: #fff; border-bottom: 3px solid #fff; }

        .grid-container {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .grid-container.active { display: grid; }

        .item-card {
            background: #111;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid #222;
        }

        /* Убрал внутренний квадрат, изображение занимает место в карточке */
        .item-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #222;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        /* Название крупнее */
        .item-name {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 5px 0;
            letter-spacing: 0.5px;
        }

        /* Описание из двух слов */
        .item-desc {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            margin: 0;
        }

        .back-btn { display: block; text-align: center; margin: 60px auto; color: #666; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="country-header"><h2>СИРИЯ</h2></div>
    <div class="city-header"><h1>ДАМАСК</h1></div>

    <nav class="category-nav">
        <button class="tab-btn active" data-target="food">ЕДА</button>
        <button class="tab-btn" data-target="strong">КРЕПКОЕ</button>
        <button class="tab-btn" data-target="beer">ПИВО</button>
        <button class="tab-btn" data-target="drinks">НАПИТКИ</button>
    </nav>

    <div id="food" class="grid-container active">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-name">хумус</div>
            <div class="item-desc">вкусно очень</div>
        </div>
    </div>

    <div id="strong" class="grid-container">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-name">арак</div>
            <div class="item-desc">крепкий напиток</div>
        </div>
    </div>

    <div id="beer" class="grid-container">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-name">аль-шарк</div>
            <div class="item-desc">легкое пиво</div>
        </div>
    </div>

    <div id="drinks" class="grid-container">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-name">Айран</div>
            <div class="item-desc">кисломолочный напиток</div>
        </div>
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-name">Чай по-восточному</div>
            <div class="item-desc">горячий чай</div>
        </div>
    </div>

    <a href="countries.html" class="back-btn">← НАЗАД К СТРАНАМ</a>

    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.grid-container').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            });
        });
    </script>
</body>
</html>
