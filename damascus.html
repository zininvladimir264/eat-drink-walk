<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИРИЯ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
        }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .top-nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        .content {
            margin-top: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        /* Квадратная область для фото */
        .photo-container {
            width: 300px;
            height: 300px;
            margin: 0 auto 15px auto;
            overflow: hidden;
            border-radius: 8px;
            background-color: #333;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#">ГЛАВНАЯ</a>
        <a href="#">СТРАНЫ</a>
    </nav>

    <div class="content">
        <h1>СИРИЯ</h1>
        
        <div class="photo-container">
            <!-- Исправленный путь: images/cities/syria.jpg -->
            <img src="images/cities/aleppo.webp" alt="Фотография Сирии" onerror="this.style.display='none'; this.parentElement.innerHTML='Фото недоступно';">
        </div>

        <div class="card-title">СИРИЯ</div>
        <div class="card-subtitle">АЛЕППО</div>
    </div>

</body>
</html>
