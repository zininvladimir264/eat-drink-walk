<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АЛЕППО - Ем ПЬЮ ХОЖУ</title>
    
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        .country-header { text-align: center; padding: 40px 20px 10px; }
        .country-header h2 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 4px; color: #666; font-weight: 600; }
        .city-header { text-align: center; padding: 20px 20px; }
        .city-header h1 { margin: 0; font-size: 45px; text-transform: uppercase; letter-spacing: 6px; font-weight: 800; }

        .category-nav {
            position: sticky; top: 0; background: rgba(0, 0, 0, 0.95); padding: 25px 0;
            display: flex; justify-content: center; gap: 25px; z-index: 100;
            border-bottom: 1px solid #222; backdrop-filter: blur(10px);
        }

        .category-nav button {
            background: none; border: none; color: #666; font-size: 20px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: 0.3s;
        }

        .category-nav button.active { color: #fff; border-bottom: 3px solid #fff; }

        /* Сетка: карточки уменьшены на 10% от предыдущих, углы скруглены */
        .grid-container {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px;
            max-width: 1080px;
            margin: 0 auto;
        }

        .grid-container.active { display: grid; }

        .item-card {
            background: #111;
            padding: 18px;
            border-radius: 24px; /* Увеличенное скругление углов */
            cursor: pointer;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.3s;
            border: 1px solid #222;
        }

        .item-card:hover { transform: scale(1.03); background: #1a1a1a; }

        .item-image {
            width: 65%;
            aspect-ratio: 1 / 1;
            background-color: #222;
            margin-bottom: 12px;
            border-radius: 16px;
        }

        .item-info h3 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .item-info p { margin: 6px 0 0 0; color: #666; font-size: 13px; }

        .back-btn { display: block; text-align: center; margin: 60px auto; color: #666; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="country-header"><h2>СИРИЯ</h2></div>
    <div class="city-header"><h1>ДАМАСК</h1></div>

    <nav class="category-nav">
        <button class="tab-btn active" data-target="food">ЕДА</button>
        <button class="tab-btn" data-target="strong">КРЕПКОЕ</button>
        <button class="tab-btn" data-target="beer">ПИВО</button>
        <button class="tab-btn" data-target="drinks">НАПИТКИ</button>
        <button class="tab-btn" data-target="places">МЕСТА</button>
    </nav>

    <!-- ЕДА -->
    <div id="food" class="grid-container active">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info"><h3>хумус</h3><p>закуска</p></div>
        </div>
    </div>

    <!-- КРЕПКОЕ -->
    <div id="strong" class="grid-container">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info"><h3>арак</h3><p>крепкое</p></div>
        </div>
    </div>

    <!-- ПИВО -->
    <div id="beer" class="grid-container">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info"><h3>аль-шарк</h3><p>пиво</p></div>
        </div>
    </div>

    <!-- НАПИТКИ -->
    <div id="drinks" class="grid-container">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info"><h3>Айран</h3></div>
        </div>
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info"><h3>Чай по-восточному</h3></div>
        </div>
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info"><h3>Компот</h3></div>
        </div>
    </div>

    <!-- МЕСТА -->
    <div id="places" class="grid-container">
        <div class="item-card">
            <div class="item-image"></div>
            <div class="item-info"><h3>старый город</h3><p>место</p></div>
        </div>
    </div>

    <a href="countries.html" class="back-btn">← НАЗАД К СТРАНАМ</a>

    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.grid-container').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            });
        });
    </script>
</body>
</html>
