<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЕМ ПЬЮ ХОЖУ</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .page { display: none; width: 100%; max-width: 600px; text-align: center; }
        .active { display: block; }
        .title { font-size: 28px; margin-bottom: 20px; font-weight: bold; }
        .btn-back { display: block; margin: 10px auto; padding: 8px 16px; background: #444; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .item { padding: 15px; background: #222; margin: 10px 0; border-radius: 8px; cursor: pointer; font-size: 18px; }
        .city-img { width: 100%; max-width: 400px; border-radius: 12px; cursor: pointer; margin: 20px 0; }
    </style>
</head>
<body>

    <!-- 1. Страны -->
    <div id="page-countries" class="page active">
        <div class="title">СТРАНЫ</div>
        <div class="item" onclick="showPage('page-syria')">СИРИЯ</div>
    </div>

    <!-- 2. Сирия -->
    <div id="page-syria" class="page">
        <button class="btn-back" onclick="showPage('page-countries')">Назад к странам</button>
        <div class="title">СИРИЯ</div>
        <img src="https://images.unsplash.com/photo-1601633532709-644917a264a7?q=80&w=600" 
             alt="Алеппо" class="city-img" onclick="showPage('page-aleppo')">
    </div>

    <!-- 3. Алеппо -->
    <div id="page-aleppo" class="page">
        <button class="btn-back" onclick="showPage('page-syria')">Назад к Сирии</button>
        <div class="title">Алеппо</div>
        <div style="margin-top: 50px;">
            <p>Добро пожаловать в Алеппо</p>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
