<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ГОРОДА - Ем ПЬЮ ХОЖУ</title>
    
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        .заголовок-города {
            text-align: center;
            padding: 40px 20px;
        }

        .заголовок-города h1 {
            margin: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
        }

        .сетка-контейнер {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .карточка-элемента {
            background: #111;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #222;
        }

        .карточка-элемента h3 {
            margin: 0 0 5px 0;
            text-transform: uppercase;
            font-size: 20px;
            font-weight: 900;
        }

        .карточка-элемента p {
            margin: 0;
            color: #888;
            text-transform: uppercase;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .сетка-контейнер { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="заголовок-города">
        <h1>ГОРОДА</h1>
    </div>

    <div class="сетка-контейнер">
        <div class="карточка-элемента"><h3>Сирия</h3><p>Дамаск</p></div>
        <div class="карточка-элемента"><h3>Польша</h3><p>Шецин</p></div>
        <div class="карточка-элемента"><h3>Финляндия</h3><p>Хельсинки</p></div>
        <div class="карточка-элемента"><h3>Ирландия</h3><p>Дублин</p></div>
        <div class="карточка-элемента"><h3>Англия</h3><p>Лондон, Брайтон</p></div>
        <div class="карточка-элемента"><h3>Шотландия</h3><p>Эдинбург</p></div>
        <div class="карточка-элемента"><h3>Франция</h3><p>Париж</p></div>
        <div class="карточка-элемента"><h3>Италия</h3><p>Рим, Венеция, Флоренция</p></div>
        <div class="карточка-элемента"><h3>Мексика</h3><p>Канкун</p></div>
        <div class="карточка-элемента"><h3>Куба</h3><p>Гавана</p></div>
        <div class="карточка-элемента"><h3>Тунис</h3><p>Тунис</p></div>
    </div>

</body>
</html>
