<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ШОТЛАНДИЯ</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 50px; 
            font-size: 14px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        .header a { color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 4px; }

        .country-title {
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .cities-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px; /* Увеличил отступы для красоты на ПК */
            width: 100%;
            max-width: 1200px;
        }

        /* Зафиксированный размер для ПК */
        .city-card {
            width: 350px; 
        }

        .city-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #1a1a1a;
            border-radius: 15px;
            margin-bottom: 20px;
            background-size: cover;
            background-position: center;
            border: 1px solid #333;
        }

        .city-name {
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* Адаптив: две карточки в ряд на мобильных */
        @media (max-width: 768px) {
            .cities-container {
                gap: 15px;
            }
            .city-card {
                width: calc(50% - 8px); /* Ровно две карточки в ряд */
            }
            .city-image {
                border-radius: 10px;
                margin-bottom: 10px;
            }
            .city-name {
                font-size: 14px;
                letter-spacing: 2px;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>

    <div class="country-title">ШОТЛАНДИЯ</div>

    <div class="cities-container">
        <!-- Карточка 1 -->
        <div class="city-card">
            <div class="city-image" style="background-image: url('images/cities/ed.webp');"></div>
            <div class="city-name">ЭДИНБУРГ</div>
        </div>
        
        <!-- Добавьте сюда дополнительные карточки, если нужно -->
    </div>

</body>
</html>
