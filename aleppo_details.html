<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЛЕППО</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding-top: 40px; }
        .nav { display: flex; justify-content: center; gap: 20px; font-weight: bold; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 2px; }
        .nav span { border-bottom: 2px solid transparent; padding-bottom: 5px; cursor: pointer; }
        .nav .active { border-bottom: 2px solid #fff; }
        
        h1 { text-align: center; font-size: 40px; letter-spacing: 8px; margin-bottom: 50px; text-transform: uppercase; }
        
        .grid { display: flex; justify-content: center; gap: 30px; padding: 0 20px; flex-wrap: wrap; }
        .card { width: 300px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card img { width: 300px; height: 300px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .card-desc { font-size: 14px; color: #fff; text-transform: uppercase; }

        .back { text-align: center; margin-top: 60px; font-size: 12px; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="nav">
        <span class="active">ЕДА</span>
        <span>КРЕПКОЕ</span>
        <span>ПИВО</span>
        <span>НАПИТКИ</span>
        <span>МЕСТА</span>
    </div>

    <h1>АЛЕППО</h1>

    <div class="grid">
        <div class="card">
            <img src="makbus.webp" alt="МАКБУС">
            <div class="card-title">МАКБУС</div>
            <div class="card-desc">ПРЯНЫЙ РИС С МЯСОМ.</div>
        </div>
        <div class="card">
            <img src="mashuay.webp" alt="МАШУАЙ">
            <div class="card-title">МАШУАЙ</div>
            <div class="card-desc">ЖАРЕНАЯ МАКРЕЛЬ С РИСОМ.</div>
        </div>
        <div class="card">
            <img src="haris.webp" alt="ХАРИС">
            <div class="card-title">ХАРИС</div>
            <div class="card-desc">ПШЕНИЦА С НЕЖНЫМ МЯСОМ.</div>
        </div>
    </div>

    <div class="back">← НАЗАД К СТРАНАМ</div>

</body>
</html>
