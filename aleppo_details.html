<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЛЕППО</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .nav { display: flex; justify-content: center; gap: 20px; font-weight: bold; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 1px; flex-wrap: wrap; }
        .nav span { border-bottom: 2px solid transparent; padding-bottom: 5px; cursor: pointer; color: #666; transition: 0.3s; font-size: 18px; }
        .nav span.active { color: #fff; border-bottom: 2px solid #fff; }
        h1 { font-size: 48px; letter-spacing: 8px; margin-bottom: 50px; text-transform: uppercase; }
        .grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .card { width: 360px; text-align: center; display: flex; flex-direction: column; }
        .card img { width: 360px; height: 360px; background: #222; border-radius: 12px; margin-bottom: 20px; object-fit: cover; display: block; }
        
        .card-title { font-size: 26.4px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .card-desc { font-size: 19.2px; color: #aaa; text-transform: uppercase; }
        
        .back { margin-top: 80px; font-size: 14px; letter-spacing: 2px; opacity: 0.6; cursor: pointer; padding-bottom: 50px; }
    </style>
</head>
<body>

    <div class="nav" id="nav">
        <span class="active" onclick="show('ЕДА')">ЕДА</span>
        <span onclick="show('КРЕПКОЕ')">КРЕПКОЕ</span>
        <span onclick="show('ПИВО')">ПИВО</span>
        <span onclick="show('НАПИТКИ')">НАПИТКИ</span>
        <span onclick="show('МЕСТА')">МЕСТА</span>
    </div>

    <h1>АЛЕППО</h1>

    <div class="grid" id="grid"></div>

    <div class="back" onclick="history.back()">← НАЗАД К СТРАНАМ</div>

    <script>
        // Базовый путь к папке с изображениями
        const baseFolder = 'images';

        const content = {
            'ЕДА': { folder: 'food', items: [
                { title: 'МАКБУС', desc: 'ПРЯНЫЙ РИС С МЯСОМ.', img: 'makbus.webp' },
                { title: 'МАШУАЙ', desc: 'ЖАРЕНАЯ МАКРЕЛЬ.', img: 'mashuai.webp' },
                { title: 'ФАЛАФЕЛЬ', desc: 'БОБОВЫЕ ШАРИКИ.', img: 'falafel.webp' }
            ]},
            'КРЕПКОЕ': { folder: 'spirits', items: [
                { title: 'АРАК', desc: 'АНИСОВАЯ ВОДКА.', img: 'arak.webp' },
                { title: 'МЕЗКАЛЬ', desc: 'КРЕПКИЙ ДИСТИЛЛЯТ.', img: 'mezcal.webp' },
                { title: 'БРЕНДИ', desc: 'ВИНОГРАДНЫЙ СПИРТ.', img: 'brandy.webp' }
            ]},
            'ПИВО': { folder: 'beer', items: [
                { title: 'BARADA', desc: 'СВЕТЛОЕ ПИВО.', img: 'barada.webp' },
                { title: 'AL SHARQ', desc: 'МЕСТНЫЙ ЛАГЕР.', img: 'al_sharq.webp' },
                { title: 'GOLDEN', desc: 'ФИЛЬТРОВАННОЕ ПИВО.', img: 'golden.webp' }
            ]},
            'НАПИТКИ': { folder: 'drinks', items: [
                { title: 'МАТЭ', desc: 'ТРАДИЦИОННЫЙ ЧАЙ.', img: 'mate.webp' },
                { title: 'ДЖАЛЛАБ', desc: 'ВИНОГРАДНЫЙ СИРОП.', img: 'jallab.webp' },
                { title: 'АЙРАН', desc: 'КИСЛОМОЛОЧНЫЙ НАПИТОК.', img: 'ayran.webp' }
            ]},
            'МЕСТА': { folder: 'locations', items: [
                { title: 'ЦИТАДЕЛЬ', desc: 'ДРЕВНЯЯ КРЕПОСТЬ.', img: 'citadel.webp' },
                { title: 'СУК', desc: 'СТАРЫЙ РЫНОК.', img: 'souq.webp' },
                { title: 'МЕЧЕТЬ', desc: 'ВЕЛИКАЯ МЕЧЕТЬ.', img: 'mosque.webp' }
            ]}
        };

        function show(cat) {
            document.querySelectorAll('.nav span').forEach(s => s.classList.toggle('active', s.innerText === cat));
            const category = content[cat];
            
            document.getElementById('grid').innerHTML = category.items.map(i => `
                <div class="card">
                    <img src="${baseFolder}/${category.folder}/${i.img}" alt="${i.title}" onerror="this.style.background='#333'">
                    <div class="card-title">${i.title}</div>
                    <div class="card-desc">${i.desc}</div>
                </div>
            `).join('');
        }
        
        show('ЕДА');
    </script>
</body>
</html>
