<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЛЕППО</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .nav { display: flex; justify-content: center; gap: 20px; font-weight: bold; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 2px; }
        .nav span { border-bottom: 2px solid transparent; padding-bottom: 5px; cursor: pointer; color: #666; transition: 0.3s; }
        .nav span.active { color: #fff; border-bottom: 2px solid #fff; }
        h1 { font-size: 40px; letter-spacing: 8px; margin-bottom: 50px; text-transform: uppercase; }
        
        .grid { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; padding: 20px; }
        
        .card { width: 360px; text-align: center; }
        
        /* Картинка теперь абсолютно чистая, без лишних элементов */
        .card img { width: 360px; height: 360px; background: #222; border-radius: 10px; margin-bottom: 20px; display: block; object-fit: cover; }
        
        /* Текст под картинкой: увеличен и отцентрирован */
        .card-title { font-size: 26px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; text-align: center; }
        .card-desc { font-size: 18px; color: #aaa; text-transform: uppercase; text-align: center; }
        
        .back { margin-top: 80px; font-size: 12px; letter-spacing: 2px; opacity: 0.6; cursor: pointer; padding-bottom: 50px; }
    </style>
</head>
<body>

    <div class="nav" id="nav">
        <span class="active" onclick="show('ЕДА')">ЕДА</span>
        <span onclick="show('КРЕПКОЕ')">КРЕПКОЕ</span>
        <span onclick="show('ПИВО')">ПИВО</span>
        <span onclick="show('НАПИТКИ')">НАПИТКИ</span>
        <span onclick="show('МЕСТА')">МЕСТА</span>
    </div>

    <h1>АЛЕППО</h1>

    <div class="grid" id="grid"></div>

    <div class="back">← НАЗАД К СТРАНАМ</div>

    <script>
        const content = {
            'ЕДА': [
                { src: 'makbus.webp', title: 'МАКБУС', desc: 'ПРЯНЫЙ РИС С МЯСОМ.' },
                { src: 'mashuay.webp', title: 'МАШУАЙ', desc: 'ЖАРЕНАЯ МАКРЕЛЬ.' },
                { src: 'haris.webp', title: 'ХАРИС', desc: 'ПШЕНИЦА С МЯСОМ.' }
            ],
            'КРЕПКОЕ': [
                { src: 'arak.webp', title: 'АРАК', desc: 'АНИСОВАЯ ВОДКА.' },
                { src: 'brandy.webp', title: 'БРЕНДИ', desc: 'МЕСТНЫЙ ВИНОГРАДНЫЙ.' },
                { src: 'wiskey.webp', title: 'ВИСКИ', desc: 'КЛАССИЧЕСКИЙ ВАРИАНТ.' }
            ],
            'ПИВО': [
                { src: 'barada.webp', title: 'BARADA', desc: 'СВЕТЛОЕ ПИВО.' },
                { src: 'alshark.webp', title: 'AL SHARK', desc: 'КЛАССИЧЕСКИЙ ЛАГЕР.' },
                { src: 'amrit.webp', title: 'AMRIT', desc: 'ТЕМНОЕ ПИВО.' }
            ],
            'НАПИТКИ': [
                { src: 'mate.webp', title: 'МАТЭ', desc: 'ТРАДИЦИОННЫЙ ЧАЙ.' },
                { src: 'jallab.webp', title: 'ДЖАЛЛАБ', desc: 'ВИНОГРАДНЫЙ СИРОП.' },
                { src: 'ayran.webp', title: 'АЙРАН', desc: 'КИСЛОМОЛОЧНЫЙ.' }
            ],
            'МЕСТА': [
                { src: 'citadel.webp', title: 'ЦИТАДЕЛЬ', desc: 'ДРЕВНЯЯ КРЕПОСТЬ.' },
                { src: 'souq.webp', title: 'СУК', desc: 'СТАРЫЙ РЫНОК.' },
                { src: 'mosque.webp', title: 'МЕЧЕТЬ', desc: 'ВЕЛИКАЯ МЕЧЕТЬ.' }
            ]
        };

        function show(cat) {
            document.querySelectorAll('.nav span').forEach(s => s.classList.toggle('active', s.innerText === cat));
            document.getElementById('grid').innerHTML = content[cat].map(i => `
                <div class="card">
                    <img src="${i.src}" alt="${i.title}" onerror="this.style.background='#333'">
                    <div class="card-title">${i.title}</div>
                    <div class="card-desc">${i.desc}</div>
                </div>
            `).join('');
        }
        show('ЕДА');
    </script>
</body>
</html>
