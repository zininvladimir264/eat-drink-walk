<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОПЫТ ДРУЗЕЙ</title>
    <style>
        body { 
            background-color: #0b0b14; 
            color: #cccccc; /* Сделал цвет текста чуть мягче/потусклее */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
        }
        
        .header { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 60px; 
            font-size: 14px; 
            letter-spacing: 2px; 
            color: #ffffff; 
        }
        .header span.active {
            border-bottom: 1px solid #ffffff;
            padding-bottom: 4px;
        }

        .continent-container { margin-bottom: 50px; }
        .continent-header { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 20px; 
            font-weight: 300; /* Более легкий шрифт */
            margin-bottom: 20px; 
            border-bottom: 1px solid #ffffff; 
            display: inline-block; 
            padding: 0 10px;
            color: #ffffff;
        }

        .countries-list { 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-transform: uppercase; 
            font-size: 16px; 
            letter-spacing: 2px; 
            font-weight: 300; /* Более легкий шрифт */
            line-height: 2.2;
        }

        .countries-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 80px; 
            max-width: 700px; 
            margin: 0 auto; 
            text-transform: uppercase; 
            font-size: 16px; 
            letter-spacing: 2px; 
            font-weight: 300; /* Более легкий шрифт */
        }
        .col-left { text-align: right; line-height: 2.2; }
        .col-right { text-align: left; line-height: 2.2; }
    </style>
</head>
<body>

    <div class="header">
        <span class="active">ГЛАВНАЯ</span>
        <span class="active">СТРАНЫ</span>
    </div>

    <!-- АЗИЯ -->
    <div class="continent-container">
        <div class="continent-header">АЗИЯ</div>
        <div class="countries-list">
            <span>СИРИЯ</span>
        </div>
    </div>

    <!-- ЕВРОПА -->
    <div class="continent-container">
        <div class="continent-header">ЕВРОПА</div>
        <div class="countries-grid">
            <div class="col-left">
                ПОЛЬША<br>ФИНЛЯНДИЯ<br>ИРЛАНДИЯ<br>АНГЛИЯ
            </div>
            <div class="col-right">
                ШОТЛАНДИЯ<br>ФРАНЦИЯ<br>ИТАЛИЯ
            </div>
        </div>
    </div>

    <!-- АМЕРИКА -->
    <div class="continent-container">
        <div class="continent-header">АМЕРИКА</div>
        <div class="countries-list">
            <span>МЕКСИКА</span>
            <span>КУБА</span>
        </div>
    </div>

    <!-- АФРИКА -->
    <div class="continent-container">
        <div class="continent-header">АФРИКА</div>
        <div class="countries-list">
            <span>ТУНИС</span>
        </div>
    </div>

</body>
</html>
