<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СТРАНЫ</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 40px 20px; text-align: center; }
        .nav-link { color: #888; text-decoration: none; text-transform: uppercase; margin-bottom: 40px; display: block; }
        h1 { text-transform: uppercase; letter-spacing: 4px; font-weight: 300; margin-bottom: 40px; }
        .continent-header { text-transform: uppercase; letter-spacing: 2px; margin-top: 50px; margin-bottom: 20px; font-size: 24px; border-bottom: 1px solid #333; display: inline-block; padding: 0 20px; }
        .countries-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; margin: 0 auto; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        .col-left { text-align: right; }
        .col-right { text-align: left; }
        .country-item { margin-bottom: 15px; }
    </style>
</head>
<body>

    <a href="#" class="nav-link">ГЛАВНАЯ</a>
    <h1>СТРАНЫ</h1>

    <!-- АЗИЯ -->
    <div class="continent-header">АЗИЯ</div>
    <div class="countries-grid">
        <div class="col-left">
            <div class="country-item">ЮЖНАЯ КОРЕЯ</div>
        </div>
        <div class="col-right">
        </div>
    </div>

    <!-- ЕВРОПА -->
    <div class="continent-header">ЕВРОПА</div>
    <div class="countries-grid">
        <div class="col-left">
            <div class="country-item">АНГЛИЯ</div>
            <div class="country-item">ИРЛАНДИЯ</div>
            <div class="country-item">ШОТЛАНДИЯ</div>
        </div>
        <div class="col-right">
            <div class="country-item">ИТАЛИЯ</div>
            <div class="country-item">ФРАНЦИЯ</div>
        </div>
    </div>

    <!-- АМЕРИКА -->
    <div class="continent-header">АМЕРИКА</div>
    <div class="countries-grid">
        <div class="col-left">
            <div class="country-item">МЕКСИКА</div>
        </div>
        <div class="col-right">
            <div class="country-item">КУБА</div>
        </div>
    </div>

    <!-- АФРИКА -->
    <div class="continent-header">АФРИКА</div>
    <div class="countries-grid">
        <div class="col-left">
            <div class="country-item">ТУНИС</div>
        </div>
        <div class="col-right">
        </div>
    </div>

</body>
</html>
