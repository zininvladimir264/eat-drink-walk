<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ОПЫТ ДРУЗЕЙ - Ем ПЬЮ ХОЖУ</title>
    <style>
        body { 
            background-color: #000;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
            min-height: 100vh;
        }
        .header { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 60px; 
            font-size: 14px; 
            letter-spacing: 2px; 
        }
        .header a { 
            color: #ffffff; 
            text-decoration: none; 
            border-bottom: 1px solid #ffffff; 
            padding-bottom: 4px; 
            transition: opacity 0.3s;
        }
        
        .continent-container { margin-bottom: 50px; }
        .continent-header { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 20px; 
            font-weight: 800; 
            margin-bottom: 30px; 
            color: #ffffff; 
        }

        .city-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .city-card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none;
            color: #fff;
        }
        .city-photo { 
            width: 120px; 
            height: 120px; 
            background-color: #222; 
            border-radius: 20px; 
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
        }
        .city-name { 
            font-size: 14px; 
            text-transform: uppercase; 
            font-weight: 600; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>

    <!-- Пример структуры для одной страны (например, Россия и её города) -->
    <div class="continent-container">
        <div class="continent-header">РОССИЯ</div>
        <div class="city-grid">
            <a href="novosibirsk.html" class="city-card">
                <div class="city-photo" style="background-image: url('images/locations/novosibirsk_main.webp');"></div>
                <div class="city-name">НОВОСИБИРСК</div>
            </a>
            <a href="tomsk.html" class="city-card">
                <div class="city-photo" style="background-image: url('images/locations/tomsk_main.webp');"></div>
                <div class="city-name">ТОМСК</div>
            </a>
            <a href="irkutsk.html" class="city-card">
                <div class="city-photo" style="background-image: url('images/locations/irkutsk_main.webp');"></div>
                <div class="city-name">ИРКУТСК</div>
            </a>
        </div>
    </div>

    <div class="continent-container">
        <div class="continent-header">БУРЯТИЯ</div>
        <div class="city-grid">
            <a href="ulan_ude.html" class="city-card">
                <div class="city-photo" style="background-image: url('images/locations/ulan_ude_main.webp');"></div>
                <div class="city-name">УЛАН-УДЭ</div>
            </a>
        </div>
    </div>

</body>
</html>
