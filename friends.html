<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СТРАНЫ</title>
    
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 45px;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 800;
            margin: 0 0 40px 0;
        }

        .continent-header {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 60px 0 30px 0;
            font-size: 28px;
            font-weight: 900;
            color: #fff;
        }

        .countries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .country-item {
            padding: 15px;
            background: #111;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid #222;
        }

        @media (max-width: 600px) {
            .countries-grid { grid-template-columns: 1fr; }
            h1 { font-size: 32px; }
            .continent-header { font-size: 22px; }
        }
    </style>
</head>
<body>

    <h1>СТРАНЫ</h1>

    <!-- АЗИЯ -->
    <div class="continent-header">Азия</div>
    <div class="countries-grid">
        <div class="country-item">Сирия</div>
    </div>

    <!-- ЕВРОПА -->
    <div class="continent-header">Европа</div>
    <div class="countries-grid">
        <div class="country-item">Англия</div>
        <div class="country-item">Ирландия</div>
        <div class="country-item">Шотландия</div>
        <div class="country-item">Италия</div>
        <div class="country-item">Франция</div>
        <div class="country-item">Польша</div>
        <div class="country-item">Финляндия</div>
    </div>

    <!-- АМЕРИКА -->
    <div class="continent-header">Америка</div>
    <div class="countries-grid">
        <div class="country-item">Мексика</div>
        <div class="country-item">Куба</div>
    </div>

    <!-- АФРИКА -->
    <div class="continent-header">Африка</div>
    <div class="countries-grid">
        <div class="country-item">Тунис</div>
    </div>

</body>
</html>
