<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОПЫТ ДРУЗЕЙ</title>
    <style>
        body { 
            background-color: #0b0b14; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
        }
        .header { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 60px; 
            font-size: 14px; 
            letter-spacing: 2px; 
            color: #ffffff; 
        }
        .continent-container { margin-bottom: 50px; }
        .continent-header { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 20px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            border-bottom: 2px solid #ffffff; 
            display: inline-block; 
            padding: 0 10px;
        }
        /* Центрированный список стран */
        .countries-list { 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-transform: uppercase; 
            font-size: 16px; 
            letter-spacing: 2px; 
            font-weight: 500;
            line-height: 2.2;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>ГЛАВНАЯ</span>
        <span>ОПЫТ ДРУЗЕЙ</span>
    </div>

    <!-- ЕВРОПА -->
    <div class="continent-container">
        <div class="continent-header">ЕВРОПА</div>
        <div class="countries-list">
            <span>СИРИЯ</span>
            <span>ПОЛЬША</span>
            <span>ФИНЛЯНДИЯ</span>
            <span>ИРЛАНДИЯ</span>
            <span>АНГЛИЯ</span>
            <span>ШОТЛАНДИЯ</span>
        </div>
    </div>

    <!-- АМЕРИКА -->
    <div class="continent-container">
        <div class="continent-header">АМЕРИКА</div>
        <div class="countries-list">
            <span>МЕКСИКА</span>
            <span>КУБА</span>
        </div>
    </div>

    <!-- АФРИКА -->
    <div class="continent-container">
        <div class="continent-header">АФРИКА</div>
        <div class="countries-list">
            <span>ТУНИС</span>
        </div>
    </div>

</body>
</html>
