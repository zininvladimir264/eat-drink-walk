<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОПЫТ ДРУЗЕЙ</title>
    <style>
        body { 
            background-color: #0b0b14; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
        }
        .header { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 60px; 
            font-size: 14px; 
            letter-spacing: 2px; 
            color: #ffffff; 
        }
        .continent-container { margin-bottom: 50px; }
        .continent-header { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 20px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            border-bottom: 2px solid #ffffff; 
            display: inline-block; 
            padding: 0 10px;
        }
        .countries-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 80px; 
            max-width: 700px; 
            margin: 0 auto; 
            text-transform: uppercase; 
            font-size: 16px; 
            letter-spacing: 2px; 
            font-weight: 500;
        }
        .col-left { text-align: right; line-height: 2.2; }
        .col-right { text-align: left; line-height: 2.2; }
    </style>
</head>
<body>

    <div class="header">
        <span>ГЛАВНАЯ</span>
        <span>ОПЫТ ДРУЗЕЙ</span>
    </div>

    <div class="continent-container">
        <div class="continent-header">АЗИЯ</div>
        <div class="countries-grid">
            <div class="col-left">ЯПОНИЯ</div>
            <div class="col-right"></div>
        </div>
    </div>

    <div class="continent-container">
        <div class="continent-header">ЕВРОПА</div>
        <div class="countries-grid">
            <div class="col-left">ПОЛЬША</div>
            <div class="col-right"></div>
        </div>
    </div>

    <div class="continent-container">
        <div class="continent-header">АМЕРИКА</div>
        <div class="countries-grid">
            <div class="col-left">МЕКСИКА</div>
            <div class="col-right"></div>
        </div>
    </div>

    <div class="continent-container">
        <div class="continent-header">АФРИКА</div>
        <div class="countries-grid">
            <div class="col-left">ТУНИС</div>
            <div class="col-right"></div>
        </div>
    </div>

</body>
</html>
