<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОПЫТ ДРУЗЕЙ</title>
    <style>
        body { 
            background: linear-gradient(rgba(11, 11, 20, 0.5), rgba(11, 11, 20, 0.5)), 
                        url('images/mir1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #cccccc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            text-align: center; 
            min-height: 100vh;
            font-weight: 300;
        }
        
        .header { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 60px; 
            font-size: 14px; 
            letter-spacing: 2px; 
        }
        .header a {
            color: #ffffff;
            text-decoration: none;
            cursor: pointer;
            padding-bottom: 4px;
            border-bottom: 1px solid #ffffff;
            font-weight: 300;
            transition: opacity 0.3s;
        }
        .header a:hover {
            opacity: 0.7;
        }

        .continent-container { margin-bottom: 50px; }
        .continent-header { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 20px; 
            font-weight: 300; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #ffffff; 
            display: inline-block; 
            padding: 0 10px;
            color: #ffffff;
        }

        .countries-list { 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-transform: uppercase; 
            font-size: 16px; 
            letter-spacing: 2px; 
            font-weight: 300; 
            line-height: 2.2;
            color: #cccccc;
        }

        .countries-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 40px; 
            max-width: 500px; 
            margin: 0 auto; 
            text-transform: uppercase; 
            font-size: 16px; 
            letter-spacing: 2px; 
            font-weight: 300; 
            color: #cccccc;
        }
        .col-left { text-align: right; line-height: 2.2; }
        .col-right { text-align: left; line-height: 2.2; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="countries.html">СТРАНЫ</a>
    </div>

    <div class="continent-container">
        <div class="continent-header">АЗИЯ</div>
        <div class="countries-list">
            <span>СИРИЯ</span>
        </div>
    </div>

    <div class="continent-container">
        <div class="continent-header">ЕВРОПА</div>
        <div class="countries-grid">
            <div class="col-left">
                ПОЛЬША<br>ФИНЛЯНДИЯ<br>ИРЛАНДИЯ<br>АНГЛИЯ
            </div>
            <div class="col-right">
                ШОТЛАНДИЯ<br>ФРАНЦИЯ<br>ИТАЛИЯ
            </div>
        </div>
    </div>

    <div class="continent-container">
        <div class="continent-header">АМЕРИКА</div>
        <div class="countries-list">
            <span>МЕКСИКА</span>
            <span>КУБА</span>
        </div>
    </div>

    <div class="continent-container">
        <div class="continent-header">АФРИКА</div>
        <div class="countries-list">
            <span>ТУНИС</span>
        </div>
    </div>

</body>
</html>
