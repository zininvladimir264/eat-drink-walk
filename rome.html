<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИТАЛИЯ</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 50px; 
            font-size: 16px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        .header a { color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 4px; }

        .country-title {
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 40px;
        }

        .cities-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            flex-wrap: wrap;
        }

        .city-card {
            width: 25%; /* Уменьшил размер карточек */
            min-width: 120px; /* Минимальный размер, чтобы они были аккуратными */
        }

        .city-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
            border: 1px solid #333;
        }

        .city-name {
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .back-link {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #ffffff;
            opacity: 0.8;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .city-card {
                width: 40%; /* Карточки занимают чуть меньше половины, встают в два ряда */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>

    <div class="country-title">ИТАЛИЯ</div>

    <div class="cities-container">
        <div class="city-card">
            <div class="city-image" style="background-image: url('images/cities/ri.webp');"></div>
            <div class="city-name">РИМ</div>
        </div>
        <div class="city-card">
            <div class="city-image" style="background-image: url('images/cities/ve.webp');"></div>
            <div class="city-name">ВЕНЕЦИЯ</div>
        </div>
        <div class="city-card">
            <div class="city-image" style="background-image: url('images/cities/fl.webp');"></div>
            <div class="city-name">ФЛОРЕНЦИЯ</div>
        </div>
    </div>

    <a href="friends.html" class="back-link">← НАЗАД К СТРАНАМ</a>

</body>
</html>
