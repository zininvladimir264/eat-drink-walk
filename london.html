<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛОНДОН</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: #000;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 50px; 
            font-size: 16px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        .header a { color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 4px; }

        .country-title {
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 40px;
        }

        .cities-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            flex-wrap: wrap;
        }

        .city-card {
            width: 25%;
            min-width: 150px;
        }

        .city-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #333;
            border-radius: 12px;
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
            border: 1px solid #444;
        }

        .city-name {
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>

    <div class="country-title">ЛОНДОН</div>

    <div class="cities-container">
        <!-- Используем указанный вами путь к файлу -->
        <div class="city-card">
            <div class="city-image" style="background-image: url('images/cities/lo.webp');"></div>
            <div class="city-name">ЛОНДОН</div>
        </div>
        <div class="city-card">
            <div class="city-image" style="background-image: url('images/cities/br.webp');"></div>
            <div class="city-name">БРАЙТОН</div>
        </div>
    </div>

</body>
</html>
