<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АНГЛИЯ</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 50px; 
            font-size: 14px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        .header a { color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 4px; }

        .country-title {
            font-size: 40px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 50px;
        }

        /* Контейнер для двух карточек */
        .cities-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 800px; /* Ограничиваем ширину, чтобы не были слишком огромными */
        }

        .city-card {
            flex: 1; /* Обе карточки занимают равное место */
            max-width: 350px; /* Максимальный размер карточки */
            display: flex;
            flex-direction: column;
        }

        /* Квадратный контейнер */
        .city-image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%; 
            background-color: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .city-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .city-name {
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 20px;
            text-align: center;
        }

        /* Адаптив для телефонов */
        @media (max-width: 600px) {
            .cities-container {
                gap: 20px;
            }
            .city-name {
                font-size: 16px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>

    <div class="country-title">АНГЛИЯ</div>

    <div class="cities-container">
        <!-- Карточка: ЛОНДОН -->
        <div class="city-card">
            <div class="city-image-wrapper">
                <div class="city-image" style="background-image: url('images/cities/lo.webp');"></div>
            </div>
            <div class="city-name">ЛОНДОН</div>
        </div>

        <!-- Карточка: БРАЙТОН -->
        <div class="city-card">
            <div class="city-image-wrapper">
                <div class="city-image" style="background-image: url('images/cities/br.webp');"></div>
            </div>
            <div class="city-name">БРАЙТОН</div>
        </div>
    </div>

</body>
</html>
