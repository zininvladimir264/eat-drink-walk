<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛОНДОН</title>
    <style>
        body { 
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/mir1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 50px; 
            font-size: 14px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        .header a { color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 4px; }

        .country-title {
            font-size: 32px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 40px;
        }

        .cities-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 карточки на ПК */
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .city-card {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Создаем идеальный квадрат через хак с padding-bottom */
        .city-image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%; /* Это делает элемент квадратным */
            background-color: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .city-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .city-name {
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 15px;
            text-align: center;
        }

        /* Адаптив: две карточки в ряд на мобильных */
        @media (max-width: 768px) {
            .cities-container {
                grid-template-columns: repeat(2, 1fr); /* 2 карточки на телефоне */
                gap: 15px;
            }
            .city-image-wrapper {
                border-radius: 10px;
            }
            .city-name {
                font-size: 14px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="friends.html">СТРАНЫ</a>
    </div>

    <div class="country-title">ЛОНДОН</div>

    <div class="cities-container">
        <!-- Карточка 1 -->
        <div class="city-card">
            <div class="city-image-wrapper">
                <div class="city-image" style="background-image: url('images/cities/lo.webp');"></div>
            </div>
            <div class="city-name">ЛОНДОН</div>
        </div>
        <!-- Карточка 2 -->
        <div class="city-card">
            <div class="city-image-wrapper">
                <div class="city-image" style="background-image: url('images/cities/lo.webp');"></div>
            </div>
            <div class="city-name">ЛОНДОН</div>
        </div>
        <!-- Карточка 3 -->
        <div class="city-card">
            <div class="city-image-wrapper">
                <div class="city-image" style="background-image: url('images/cities/lo.webp');"></div>
            </div>
            <div class="city-name">ЛОНДОН</div>
        </div>
        <!-- Карточка 4 -->
        <div class="city-card">
            <div class="city-image-wrapper">
                <div class="city-image" style="background-image: url('images/cities/lo.webp');"></div>
            </div>
            <div class="city-name">ЛОНДОН</div>
        </div>
    </div>

</body>
</html>
