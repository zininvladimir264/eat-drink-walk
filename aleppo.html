<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЛЕППО</title>
    <style>
        body { margin: 0; padding: 20px; background: #000; color: #fff; font-family: sans-serif; }
        .city-header { text-align: center; margin-bottom: 20px; }
        .city-header h1 { letter-spacing: 4px; }
        
        .category-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { background: #222; border: 1px solid #444; color: #fff; padding: 10px 15px; cursor: pointer; border-radius: 5px; text-transform: lowercase; }
        .tab-btn.active { background: #fff; color: #000; border-color: #fff; }

        .grid-container { display: none; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .grid-container.active { display: grid; }

        /* Вся карточка является кликабельной зоной */
        .item-card { 
            background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; 
            text-decoration: none; color: inherit; display: block; cursor: pointer;
            transition: transform 0.2s;
        }
        .item-card:hover { transform: scale(1.02); border-color: #777; }
        
        .item-image { width: 100%; height: 200px; object-fit: cover; display: block; background: #333; }
        
        .item-info { padding: 15px; }
        .item-info h3 { margin: 0 0 5px; font-size: 1.1em; text-transform: uppercase; }
        .item-info p { margin: 0; color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="city-header"><h1>АЛЕППО</h1></div>

    <nav class="category-nav">
        <button class="tab-btn active" data-target="food">food</button>
        <button class="tab-btn" data-target="spirits">spirits</button>
        <button class="tab-btn" data-target="beer">beer</button>
        <button class="tab-btn" data-target="drinks">drinks</button>
        <button class="tab-btn" data-target="locations">locations</button>
    </nav>

    <div id="food" class="grid-container active">
        <div class="item-card" onclick="alert('KIBBEH')">
            <img src="images/food/kibbeh.webp" class="item-image" alt="KIBBEH" onerror="this.style.display='none'">
            <div class="item-info"><h3>KIBBEH</h3><p>Мясные шарики</p></div>
        </div>
        <div class="item-card" onclick="alert('MUJADARA')">
            <img src="images/food/mujadara.webp" class="item-image" alt="MUJADARA" onerror="this.style.display='none'">
            <div class="item-info"><h3>MUJADARA</h3><p>Рис чечевица</p></div>
        </div>
    </div>

    <div id="spirits" class="grid-container">
        <div class="item-card" onclick="alert('ARAK')">
            <img src="images/spirits/arak.webp" class="item-image" alt="ARAK" onerror="this.style.display='none'">
            <div class="item-info"><h3>ARAK</h3><p>Анисовая водка</p></div>
        </div>
    </div>

    <div id="beer" class="grid-container">
        <div class="item-card" onclick="alert('BARADA')">
            <img src="images/beer/barada.webp" class="item-image" alt="BARADA" onerror="this.style.display='none'">
            <div class="item-info"><h3>BARADA</h3><p>Сирийское пиво</p></div>
        </div>
    </div>

    <div id="drinks" class="grid-container">
        <div class="item-card" onclick="alert('ARABIC COFFEE')">
            <img src="images/drinks/coffee.webp" class="item-image" alt="ARABIC COFFEE" onerror="this.style.display='none'">
            <div class="item-info"><h3>ARABIC COFFEE</h3><p>Кофе кардамон</p></div>
        </div>
    </div>

    <div id="locations" class="grid-container">
        <div class="item-card" onclick="alert('CITADEL')">
            <img src="images/locations/citadel.webp" class="item-image" alt="CITADEL" onerror="this.style.display='none'">
            <div class="item-info"><h3>CITADEL</h3><p>Древняя крепость</p></div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.grid-container').forEach(div => div.classList.remove('active'));
                button.classList.add('active');
                document.getElementById(button.getAttribute('data-target')).classList.add('active');
            });
        });
    </script>
</body>
</html>
