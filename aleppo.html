<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>АЛЕППО - ЕМ ПЬЮ ХОЖУ</title>
    <style>
        body { margin: 0; background-color: #0f0f0f; color: #fff; font-family: sans-serif; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #d4af37; }
        .nav-menu { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .nav-btn { background: none; border: none; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-btn.active { border-bottom: 2px solid #d4af37; }
        .section { display: none; padding: 40px; }
        .section.active { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #1a1a1a; padding: 15px; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
    </style>
</head>
<body>

<div class="header"><h1>АЛЕППО</h1></div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('food', this)">Еда</button>
    <button class="nav-btn" onclick="showSection('spirit', this)">Крепкое</button>
    <button class="nav-btn" onclick="showSection('beer', this)">Пиво</button>
    <button class="nav-btn" onclick="showSection('drinks', this)">Напитки</button>
    <button class="nav-btn" onclick="showSection('location', this)">Места</button>
</div>

<div id="food" class="section active">
    <div class="card"><img class="card-img" src="images/food/muhammara.webp"><h3>Мухаммара</h3><p>Пикантная закуска</p></div>
    <div class="card"><img class="card-img" src="images/food/kibbeh.webp"><h3>Киббех</h3><p>Мясное блюдо</p></div>
    <div class="card"><img class="card-img" src="images/food/fattoush.webp"><h3>Фаттуш</h3><p>Свежий салат</p></div>
</div>

<script>
    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
