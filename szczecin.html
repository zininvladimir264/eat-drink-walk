<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЩЕЦИН</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; }
        
        .navbar { display: flex; justify-content: center; gap: 40px; padding: 30px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
        
        .country-header { font-size: 33.44px; letter-spacing: 4px; margin-top: 40px; margin-bottom: 30px; text-transform: uppercase; }
        
        .container { display: flex; justify-content: center; padding: 20px; flex-direction: column; align-items: center; }
        
        /* Ссылка-обертка для карточки */
        .card-link { display: block; cursor: pointer; transition: transform 0.2s; }
        .card-link:hover { transform: scale(1.02); }
        
        .card img { 
            /* Размер уменьшен на 10% (с 400px до 360px) */
            width: 360px; 
            height: 360px; 
            background: #222; 
            border-radius: 12px; 
            object-fit: cover; 
            display: block;
        }
        
        .city-name { font-size: 23.28px; letter-spacing: 6px; margin-top: 25px; text-transform: uppercase; }
        
        .back { margin-top: 60px; font-size: 14px; letter-spacing: 2px; opacity: 0.6; cursor: pointer; padding-bottom: 50px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="nav-btn">ГЛАВНАЯ</a>
        <a href="#" class="nav-btn">СТРАНЫ</a>
    </nav>

    <div class="country-header">Польша</div>

    <div class="container">
        <!-- Ссылка на szczecin_details.html -->
        <a href="szczecin_details.html" class="card-link">
            <div class="card">
                <img src="images/cities/se.webp" alt="ЩЕЦИН" onerror="this.src='https://via.placeholder.com/360?text=Щецин'; this.onerror=null;">
            </div>
        </a>
        <div class="city-name">ЩЕЦИН</div>
    </div>

    <div class="back" onclick="history.back()">← НАЗАД К СТРАНАМ</div>

</body>
</html>
