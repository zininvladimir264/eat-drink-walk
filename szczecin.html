<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЩЕЦИН</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            overflow-x: hidden; /* Чтобы избежать прокрутки при свайпе */
        }
        
        .navbar { display: flex; justify-content: center; gap: 40px; padding: 30px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 16px; opacity: 0.7; }
        
        .country-header { font-size: 33px; letter-spacing: 4px; margin-top: 40px; margin-bottom: 30px; text-transform: uppercase; }
        
        .container { display: flex; justify-content: center; padding: 20px; flex-direction: column; align-items: center; }
        
        .card-wrapper { 
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
            touch-action: pan-y; /* Позволяет скроллить страницу, но обрабатывать свайпы */
        }
        .card-wrapper:hover { transform: scale(1.02); }

        .card { 
            width: 360px !important; 
            height: 360px !important; 
            background: #222; 
            border-radius: 12px; 
            overflow: hidden;
            display: block;
        }
        
        .card img { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover;
            display: block;
        }
        
        .city-name { font-size: 23px; letter-spacing: 6px; margin-top: 25px; text-transform: uppercase; }
        
        .back { margin-top: 60px; font-size: 14px; opacity: 0.6; cursor: pointer; padding-bottom: 50px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="nav-btn">ГЛАВНАЯ</a>
        <a href="#" class="nav-btn">СТРАНЫ</a>
    </nav>

    <div class="country-header">Польша</div>

    <div class="container" id="swipe-area">
        <div class="card-wrapper" onclick="window.location.href='szczecin_details.html'">
            <div class="card">
                <img src="images/cities/se.webp" alt="ЩЕЦИН" onerror="this.src='https://via.placeholder.com/360?text=Щецин'; this.onerror=null;">
            </div>
            <div class="city-name">ЩЕЦИН</div>
        </div>
    </div>

    <div class="back" onclick="history.back()">← НАЗАД К СТРАНАМ</div>

    <script>
        // Логика свайпа
        let touchStartX = 0;
        let touchEndX = 0;
        const swipeArea = document.getElementById('swipe-area');

        swipeArea.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        swipeArea.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleGesture();
        }, {passive: true});

        function handleGesture() {
            const threshold = 50; // Минимальное расстояние для свайпа
            if (touchEndX < touchStartX - threshold) {
                // Свайп влево (например, переход к следующему городу)
                console.log("Свайп влево");
                // window.location.href = 'next_city.html'; 
            }
            if (touchEndX > touchStartX + threshold) {
                // Свайп вправо (например, назад к выбору стран)
                console.log("Свайп вправо");
                history.back();
            }
        }
    </script>
</body>
</html>
