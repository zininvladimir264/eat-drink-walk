<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЩЕЦИН</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .nav { display: flex; justify-content: center; gap: 20px; font-weight: bold; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 1px; flex-wrap: wrap; }
        .nav span { border-bottom: 2px solid transparent; padding-bottom: 5px; cursor: pointer; color: #666; transition: 0.3s; font-size: 18px; }
        .nav span.active { color: #fff; border-bottom: 2px solid #fff; }
        h1 { font-size: 48px; letter-spacing: 8px; margin-bottom: 50px; text-transform: uppercase; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(1, 1fr); gap: 20px; padding: 10px; }
            .card img { width: 90vw !important; height: 60vw !important; }
        }
        
        .card { 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.02); }
        
        /* Ссылка теперь полностью охватывает содержимое */
        .card a { 
            text-decoration: none; 
            color: inherit; 
            display: block; 
            width: 100%;
        }
        
        .card img { 
            width: 360px; 
            height: 360px; 
            background: #222; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            object-fit: cover; 
            display: block; 
            margin-left: auto; 
            margin-right: auto;
            cursor: pointer;
        }
        
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .card-desc { font-size: 14px; color: #aaa; text-transform: uppercase; }
        
        .back { margin-top: 80px; font-size: 14px; letter-spacing: 2px; opacity: 0.6; cursor: pointer; padding-bottom: 50px; }
    </style>
</head>
<body>

    <div class="nav" id="nav">
        <span class="active">МЕСТА</span>
    </div>

    <h1>ЩЕЦИН</h1>

    <div class="grid" id="grid"></div>

    <div class="back" onclick="history.back()">← НАЗАД К СТРАНАМ</div>

    <script>
        const baseFolder = 'images';

        const content = [
            { title: 'ЩЕЦИН', desc: 'КРАСИВЫЙ ГОРОД.', img: 'szczecin.webp', link: 'szczecin_details.html' },
            { title: 'ВАВЕЛЬ', desc: 'ЗАМОК.', img: 'wawel.webp', link: '#' }
        ];

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = content.map(i => `
                <div class="card">
                    <a href="${i.link}">
                        <img src="${baseFolder}/${i.img}" alt="${i.title}" onerror="this.style.background='#333'">
                        <div class="card-title">${i.title}</div>
                        <div class="card-desc">${i.desc}</div>
                    </a>
                </div>
            `).join('');
        }
        
        render();
    </script>
</body>
</html>
