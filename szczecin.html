<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЩЕЦИН</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; }
        
        /* Панель навигации */
        .navbar { display: flex; justify-content: center; gap: 40px; padding: 30px; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; transition: opacity 0.3s; }
        .nav-btn:hover { opacity: 1; }
        
        /* Заголовок страны: был 30.4px, увеличиваем на 10% -> 33.44px */
        .country-header { font-size: 33.44px; letter-spacing: 4px; margin-top: 40px; margin-bottom: 30px; text-transform: uppercase; color: #fff; }
        
        /* Контейнер карточки */
        .container { display: flex; justify-content: center; padding: 20px; flex-direction: column; align-items: center; }
        
        .card img { 
            width: 400px; 
            height: 400px; 
            background: #222; 
            border-radius: 12px; 
            object-fit: cover; 
            display: block;
        }
        
        /* Название города: было 52.8px, уменьшаем на 30% -> 36.96px */
        .city-name { font-size: 36.96px; letter-spacing: 6px; margin-top: 25px; text-transform: uppercase; }
        
        .back { margin-top: 60px; font-size: 14px; letter-spacing: 2px; opacity: 0.6; cursor: pointer; padding-bottom: 50px; }
    </style>
</head>
<body>

    <!-- Навигация -->
    <nav class="navbar">
        <a href="#" class="nav-btn">ГЛАВНАЯ</a>
        <a href="#" class="nav-btn">СТРАНЫ</a>
    </nav>

    <div class="country-header">Польша</div>

    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1596766620583-b9b5f586940a?q=80&w=400&h=400&fit=crop" alt="ЩЕЦИН" onerror="this.style.background='#333'">
        </div>
        <div class="city-name">ЩЕЦИН</div>
    </div>

    <div class="back" onclick="history.back()">← НАЗАД К СТРАНАМ</div>

</body>
</html>
