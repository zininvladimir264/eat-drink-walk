<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ЩЕЦИН</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            overflow: hidden; /* Запрещаем прокрутку страницы */
        }
        
        #app-root {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .navbar { display: flex; justify-content: center; gap: 40px; padding: 20px; position: absolute; top: 0; }
        .nav-btn { color: #fff; text-decoration: none; font-size: 16px; opacity: 0.7; }
        
        .country-header { font-size: 33px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
        
        .card { 
            width: 360px; height: 360px; 
            background: #222; border-radius: 12px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .city-name { font-size: 23px; letter-spacing: 6px; margin-top: 25px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="app-root">
        <nav class="navbar">
            <a href="#" class="nav-btn">ГЛАВНАЯ</a>
            <a href="#" class="nav-btn">СТРАНЫ</a>
        </nav>

        <div class="country-header">Польша</div>

        <div class="card" id="swipe-area">
            <img src="images/cities/se.webp" alt="ЩЕЦИН" onerror="this.src='https://via.placeholder.com/360';">
        </div>

        <div class="city-name">ЩЕЦИН</div>
    </div>

    <script>
        let touchStartX = 0;
        const swipeArea = document.getElementById('app-root');

        swipeArea.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        swipeArea.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let delta = touchEndX - touchStartX;
            
            // Если свайп достаточно длинный (более 60px)
            if (Math.abs(delta) > 60) {
                if (delta > 0) {
                    // Свайп вправо - назад
                    window.history.back();
                } else {
                    // Свайп влево - переход
                    window.location.href = 'szczecin_details.html';
                }
            }
        }, {passive: false});
    </script>
</body>
</html>
