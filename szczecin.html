<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЩЕЦИН</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        
        .country-header { font-size: 32px; letter-spacing: 4px; margin-bottom: 20px; text-transform: uppercase; color: #888; }
        h1 { font-size: 48px; letter-spacing: 8px; margin-bottom: 50px; text-transform: uppercase; }
        
        .container { 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }
        
        .card { 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: scale(1.02); }
        
        .card a { 
            text-decoration: none; 
            color: inherit; 
            display: block; 
        }
        
        .card img { 
            width: 400px; 
            height: 400px; 
            background: #222; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            object-fit: cover; 
            display: block;
        }
        
        .card-title { font-size: 26px; font-weight: bold; text-transform: uppercase; }
        
        .back { margin-top: 80px; font-size: 14px; letter-spacing: 2px; opacity: 0.6; cursor: pointer; padding-bottom: 50px; }
    </style>
</head>
<body>

    <div class="country-header">Польша</div>
    <h1>ЩЕЦИН</h1>

    <div class="container" id="grid">
        <div class="card">
            <a href="szczecin_details.html">
                <img src="images/szczecin.webp" alt="ЩЕЦИН" onerror="this.style.background='#333'">
                <div class="card-title">ЩЕЦИН</div>
            </a>
        </div>
    </div>

    <div class="back" onclick="history.back()">← НАЗАД К СТРАНАМ</div>

</body>
</html>
